<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>{% if page.title %}{{ page.title }} – {% endif %}{{ site.name }}</title>

  <link rel="canonical" href="{{ site.url }}{{ page.url }}" />

  <link rel="icon" type="image/png" sizes="32x32" href="{{ site.baseurl }}/images/favicon.png">

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style.css">
</head>

<body>
  <div class="wrapper-container">

    <!-- HEADER -->
    <div class="wrapper-masthead">
      <header class="site-header">
        <a href="/" class="logo-link"><img src="/images/JeronikaLogo.svg" class="logo" alt="Camp Jeronika logo"></a>
        <a href="/" class="nav-home">Home</a>
        <nav class="nav">
          <a href="/practicalinformation">Practical Information</a>
          <a href="/activities">Activity Sign-Up</a>
          <a href="/registry">Registry</a>
        </nav>
      </header>
    </div>

    <!-- MAIN -->
    <div class="wrapper-main">
      <main class="page-content">
        {{ content }}
      </main>
    </div>

  </div>
</body>
</html>
